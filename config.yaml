# OpenClaw Voice Configuration
# SIP <-> Voice Agent Bridge (OpenClaw Plugin)
#
# `engine` selects the voice backend:
#   anthropic - Claude via Messages API + pluggable STT/TTS (see `stt`/`tts` below)
#   xai       - original xAI Grok Voice realtime WebSocket bridge
engine: anthropic

# Name the assistant introduces itself as (used in system instructions + greeting).
assistant_name: "${ASSISTANT_NAME}"

# Name used in greetings when talking to non-owner callers ("Hi, I'm Katie,
# {owner_name}'s assistant..."). Defaults to assistant_name if not set.
owner_name: "${OWNER_NAME}"

# Personality / familiarity level.  Options:
#   professional  - efficient, no small talk, purely business
#   friendly      - warm and personable (default)
#   casual        - relaxed and informal, like a close friend
personality: "${PERSONALITY}"

# ---------------------------------------------------------------------------
# Caller identity table
# Maps normalized phone numbers to a name and tier.
# Tiers: owner | friend | unknown (default for anyone not listed)
# ---------------------------------------------------------------------------
callers: {}
# Example:
#   "2136310879":
#     name: Sascha
#     tier: owner
#   "3238434355":
#     name: Sascha
#     tier: owner
#   "8596085443":
#     name: Mom
#     tier: friend

# Per-tier policy and default greetings.
# Greeting supports {name}, {owner_name}, {caller_name} placeholders.
caller_tiers:
  owner:
    # memory: agent (full shared memory, set via AGENT_MEMORY_DIR)
    greeting: ""   # empty = auto: "Hey {caller_name}!" or "Hey!" if no name
  friend:
    greeting: ""   # empty = auto: formal intro with name if known
  unknown:
    action: message   # take a message and save to daily log
    greeting: ""      # empty = auto: formal intro + offer to take a message

# ---------------------------------------------------------------------------
# Anthropic engine (Claude + pluggable STT/TTS)
# ---------------------------------------------------------------------------
anthropic:
  api_key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  max_tokens: 1024
  greeting: "Hello, this is ${ASSISTANT_NAME}. How can I help you?"

# Text-to-Speech provider used by the Anthropic engine.
# Options: kokoro (local, free) | openai | elevenlabs | mock
tts:
  provider: kokoro
  kokoro:
    model: kokoro-v1.0
    voice: af_heart      # see Kokoro voice list for alternatives
    lang_code: a         # 'a' = American English
    device: cpu
    speed: 1.0
  openai:
    api_key: ${OPENAI_API_KEY}
    model: tts-1
    voice: nova
  elevenlabs:
    api_key: ${ELEVENLABS_API_KEY}
    voice_id: ${ELEVENLABS_VOICE_ID}
    model_id: eleven_turbo_v2_5
    output_format: pcm_24000
  mock:
    tone_hz: 0           # 0 = silence, e.g. 440 for an audible test tone

# Speech-to-Text provider used by the Anthropic engine.
# Options: faster_whisper (local, free) | openai | mock
stt:
  provider: faster_whisper
  faster_whisper:
    model: base.en
    device: cpu
    compute_type: int8
    language: en
    # ctranslate2 intra-op thread count. Safe to set > 1 now that
    # faster-whisper runs in its own subprocess (via ProcessSTTAdapter),
    # isolated from torch's OpenMP runtime in the Kokoro TTS subprocess.
    # 4 is a good default for a 6-8 core Intel Mac; raise if transcription
    # latency is still noticeable.
    cpu_threads: 4
  openai:
    api_key: ${OPENAI_API_KEY}
    model: whisper-1
    language: en
  mock:
    fixed_text: "Hello, this is a test."

# ---------------------------------------------------------------------------
# xAI engine (original realtime voice bridge, kept for reference/fallback)
# ---------------------------------------------------------------------------
xai:
  api_key: ${XAI_API_KEY}
  voice: "Rex"  # Options: Rex, Ara, Sal, Eve, Leo
  instructions: |
    You are a helpful voice assistant.
    Keep responses brief and conversational - you're talking on a phone.

# ---------------------------------------------------------------------------
# SIP (VoIP.ms)
# ---------------------------------------------------------------------------
# In the VoIP.ms portal:
#   1. Create a SIP sub-account (Sub Accounts -> Create Sub Account)
#   2. Note your nearest POP server hostname (e.g. la.voip.ms, chicago.voip.ms)
#   3. Manage DIDs -> set routing for your DID to "SIP/IAX" -> this sub-account
sip:
  server: "${SIP_SERVER}"        # your nearest VoIP.ms POP server
  port: 5060
  extension: "${SIP_EXTENSION}"  # your VoIP.ms sub-account username
  password: "${SIP_PASSWORD}"
  display_name: "OpenClaw"
  # Set to your public IP or DDNS hostname when running behind NAT so
  # Contact/SDP advertise an address VoIP.ms can reach.
  external_ip: "${SIP_EXTERNAL_IP}"
  # RTP ports are allocated from a fixed pool [rtp_port, rtp_port + rtp_port_count)
  # so the range can be statically port-forwarded through NAT.
  rtp_port: 40000
  rtp_port_count: 10

# Audio settings
# PCMU (G.711 u-law) @ 8kHz is what VoIP.ms sends/receives - no conversion
# needed on the SIP side. STT/TTS providers resample internally as needed.
audio:
  format: "pcmu"
  sample_rate: 8000
  frame_ms: 20

# Daemon settings
daemon:
  api_port: 8079
  max_concurrent_calls: 3

# OpenClaw Gateway integration
openclaw:
  gateway_port: 18789
  gateway_token: ${OPENCLAW_GATEWAY_TOKEN}
  session_key: "openclaw-voice"

# Authentication
auth:
  pin: ${OPENCLAW_AUTH_PIN}
  whitelist: []  # caller numbers that skip PIN (e.g. ["+15551234567"])

# Persistent memory
# agent_dir: path to the agent's shared memory directory (the same one
#   text-chat Katie reads from). Set AGENT_MEMORY_DIR in .env. When set,
#   voice Katie reads MEMORY.md / USER.md / daily logs on connect and
#   appends a "## Voice Call — HH:MM TZ" summary block to today's daily log
#   on hangup (and "## SMS — HH:MM TZ" for texts).
# dir: fallback per-caller profile files when agent_dir is not set.
memory:
  agent_dir: "${AGENT_MEMORY_DIR}"
  dir: user_memory

# ---------------------------------------------------------------------------
# SMS (VoIP.ms)
# ---------------------------------------------------------------------------
# Outbound: REST call to voip.ms/api/v1/rest.php (method=sendSMS).
# Inbound:  VoIP.ms portal -> DID Numbers -> Manage DIDs -> (your DID) ->
#   pencil icon -> Short Message Service section -> check "Enable SMS/MMS"
#   and "SMS/MMS URL Callback", then set the callback URL to:
#
#     http://<external_ip>:<webhook_port>/sms/inbound?to={TO}&from={FROM}&message={MESSAGE}&id={ID}&date={TIMESTAMP}&api_key=<webhook_secret>
#
#   webhook_secret is a random string YOU generate (e.g. `openssl rand -hex 32`)
#   — VoIP.ms just echoes it back verbatim from the URL template above, it's
#   how we verify the request came from your own callback config and not a
#   random GET to the port. It is not issued by VoIP.ms.
#
#   webhook_port binds 0.0.0.0 (unlike the internal control API, which is
#   127.0.0.1-only) — port-forward it the same way you did for SIP/RTP.
sms:
  enabled: false
  api_username: "${VOIPMS_API_USERNAME}"  # email/login for the VoIP.ms portal
  api_password: "${VOIPMS_API_PASSWORD}"  # Main Menu -> SOAP/REST API -> API Security
  did: "${VOIPMS_DID}"                    # the DID to send/receive from, e.g. 3238744644
  webhook_port: 8082
  webhook_secret: "${SMS_WEBHOOK_SECRET}"

# Logging
logging:
  level: "INFO"
  record_calls: false
